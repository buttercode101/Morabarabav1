<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="192" height="192">
  <!-- Background -->
  <rect width="512" height="512" fill="#eaddd7"/>
  
  <!-- Outer square -->
  <rect x="100" y="100" width="312" height="312" fill="none" stroke="#5b433b" stroke-width="8"/>
  
  <!-- Middle square -->
  <rect x="150" y="150" width="212" height="212" fill="none" stroke="#5b433b" stroke-width="8"/>
  
  <!-- Inner square -->
  <rect x="200" y="200" width="112" height="112" fill="none" stroke="#5b433b" stroke-width="8"/>
  
  <!-- Connecting lines -->
  <line x1="256" y1="100" x2="256" y2="200" stroke="#5b433b" stroke-width="8"/>
  <line x1="256" y1="312" x2="256" y2="412" stroke="#5b433b" stroke-width="8"/>
  <line x1="100" y1="256" x2="200" y2="256" stroke="#5b433b" stroke-width="8"/>
  <line x1="312" y1="256" x2="412" y2="256" stroke="#5b433b" stroke-width="8"/>
  <line x1="100" y1="100" x2="200" y2="200" stroke="#5b433b" stroke-width="8"/>
  <line x1="412" y1="100" x2="312" y2="200" stroke="#5b433b" stroke-width="8"/>
  <line x1="100" y1="412" x2="200" y2="312" stroke="#5b433b" stroke-width="8"/>
  <line x1="412" y1="412" x2="312" y2="312" stroke="#5b433b" stroke-width="8"/>
  
  <!-- Player 1 cow (dark) -->
  <circle cx="150" cy="150" r="28" fill="#30221e"/>
  
  <!-- Player 2 cow (light) -->
  <circle cx="362" cy="362" r="28" fill="#fdf8f6" stroke="#5b433b" stroke-width="4"/>
  
  <!-- Center accent -->
  <circle cx="256" cy="256" r="20" fill="#f27696"/>
</svg>
